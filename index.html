    // 平抛运动动画 14
function startProjectileMotionAnimation() {
    const canvas = document.getElementById("projectileCanvas");
    if (!canvas) return;
    const ctx = canvas.getContext("2d");
    
    let velocity = 10;          // m/s
    let angleDeg = 0;           // 度
    let launchHeight = 5;       // m
    const g = 9.8;
    let scale = 12;             // 1m = 12px (动态更新)
    
    let isLaunched = false;
    let ball = { x: 0, y: 0, vx: 0, vy: 0 };
    let trajectory = [];
    let animFrame = null;
    let lastTimestamp = 0;
    let flightTime = 0;
    let groundY = 0, launchX = 80, platformHeight = 40;
    
    function getLaunchY(groundYVal, launchHeightVal, scaleVal) {
        return groundYVal - launchHeightVal * scaleVal;
    }
    
    function resetBall() {
        const w = canvas.clientWidth;
        const h = canvas.clientHeight;
        groundY = h - 60;
        scale = Math.max(8, Math.min(15, h / 40));  // 动态适应画布高度
        const launchY = getLaunchY(groundY, launchHeight, scale);
        const rad = angleDeg * Math.PI / 180;
        ball = {
            x: launchX,
            y: launchY,
            vx: velocity * Math.cos(rad),
            vy: -velocity * Math.sin(rad)
        };
        trajectory = [];
        flightTime = 0;
    }
    
    function calculateTheoretical() {
        const rad = angleDeg * Math.PI / 180;
        const vx0 = velocity * Math.cos(rad);
        const vy0 = -velocity * Math.sin(rad);
        const a = 0.5 * g;
        const b = vy0;
        const c = launchHeight;
        const discriminant = b*b - 4*a*c;
        let t_flight = 0;
        if (discriminant >= 0) {
            t_flight = (-b + Math.sqrt(discriminant)) / (2*a);
        }
        const range = vx0 * t_flight;
        const maxHeight = launchHeight + (vy0*vy0) / (2*g);
        return { t_flight, range, maxHeight, vx0, vy0 };
    }
    
    function drawGrid(width, height, scaleVal) {
        ctx.strokeStyle = "#ddd";
        ctx.lineWidth = 0.5;
        for (let x = 0; x <= width; x += scaleVal) {
            ctx.beginPath();
            ctx.moveTo(x, 0);
            ctx.lineTo(x, height);
            ctx.stroke();
        }
        for (let y = 0; y <= height; y += scaleVal) {
            ctx.beginPath();
            ctx.moveTo(0, y);
            ctx.lineTo(width, y);
            ctx.stroke();
        }
    }
    
    function draw() {
        const width = canvas.clientWidth;
        const height = canvas.clientHeight;
        canvas.width = width;
        canvas.height = height;
        groundY = height - 60;
        scale = Math.max(8, Math.min(15, height / 40));
        
        ctx.clearRect(0, 0, width, height);
        const bgColor = getComputedStyle(document.body).getPropertyValue('--bg-light').trim() || "#fef9f0";
        ctx.fillStyle = bgColor;
        ctx.fillRect(0, 0, width, height);
        
        drawGrid(width, height, scale);
        
        // 地面
        ctx.fillStyle = "#8B4513";
        ctx.fillRect(0, groundY, width, 20);
        
        const launchY = getLaunchY(groundY, launchHeight, scale);
        
        // 发射平台
        ctx.fillStyle = "#555";
        ctx.fillRect(launchX - 15, launchY - 5, 30, 10);
        ctx.fillStyle = "#777";
        ctx.fillRect(launchX - 5, launchY - 5, 10, platformHeight);
        
        // 理论轨迹
        const theory = calculateTheoretical();
        if (!isNaN(theory.range)) {
            ctx.beginPath();
            let first = true;
            for (let t = 0; t <= theory.t_flight; t += 0.05) {
                const x = theory.vx0 * t;
                const y = theory.vy0 * t + 0.5 * g * t * t;
                const canvasX = launchX + x * scale;
                const canvasY = launchY + y * scale;
                if (canvasY <= groundY) {
                    if (first) {
                        ctx.moveTo(canvasX, canvasY);
                        first = false;
                    } else {
                        ctx.lineTo(canvasX, canvasY);
                    }
                }
            }
            ctx.strokeStyle = "#f39c12";
            ctx.lineWidth = 2;
            ctx.setLineDash([5, 5]);
            ctx.stroke();
            ctx.setLineDash([]);
        }
        
        // 实际轨迹
        if (trajectory.length > 1) {
            ctx.beginPath();
            ctx.moveTo(trajectory[0].x, trajectory[0].y);
            for (let i = 1; i < trajectory.length; i++) {
                ctx.lineTo(trajectory[i].x, trajectory[i].y);
            }
            ctx.strokeStyle = "#e74c3c";
            ctx.lineWidth = 3;
            ctx.stroke();
        }
        
        // 小球
        ctx.beginPath();
        ctx.arc(ball.x, ball.y, 8, 0, 2*Math.PI);
        ctx.fillStyle = "#3498db";
        ctx.fill();
        ctx.strokeStyle = "#2c3e50";
        ctx.lineWidth = 2;
        ctx.stroke();
        
        // 落地点标记
        if (isLaunched && ball.y >= groundY - 8) {
            ctx.beginPath();
            ctx.arc(ball.x, groundY, 12, 0, 2*Math.PI);
            ctx.fillStyle = "#e67e22";
            ctx.fill();
        }
        
        // 数据面板
        ctx.fillStyle = "#2c2418";
        ctx.font = "bold 14px Arial";
        ctx.fillText(`初速度: ${velocity.toFixed(1)} m/s`, 20, 30);
        ctx.fillText(`发射角: ${angleDeg}°`, 20, 60);
        ctx.fillText(`高度: ${launchHeight.toFixed(1)} m`, 20, 90);
        if (!isNaN(theory.range)) {
            ctx.fillText(`理论射程: ${theory.range.toFixed(2)} m`, 20, 120);
            ctx.fillText(`最大高度: ${theory.maxHeight.toFixed(2)} m`, 20, 150);
        }
        ctx.fillText(`飞行时间: ${flightTime.toFixed(2)} s`, 20, 180);
        if (isLaunched) {
            const currentX = ((ball.x - launchX) / scale).toFixed(2);
            const currentY = ((groundY - ball.y) / scale).toFixed(2);
            ctx.fillStyle = "#e63946";
            ctx.fillText(`当前位置: (${currentX}, ${currentY}) m`, 20, 210);
        }
    }
    
    function updateBall(deltaTime) {
        if (!isLaunched) return;
        ball.vy += g * deltaTime;
        ball.x += ball.vx * deltaTime;
        ball.y += ball.vy * deltaTime;
        flightTime += deltaTime;
        trajectory.push({ x: ball.x, y: ball.y });
        if (trajectory.length > 150) trajectory.shift();
        const h = canvas.clientHeight;
        groundY = h - 60;
        if (ball.y >= groundY - 8) {
            ball.y = groundY - 8;
            isLaunched = false;
        }
    }
    
    function animate(timestamp) {
        if (!lastTimestamp) lastTimestamp = timestamp;
        const deltaTime = Math.min((timestamp - lastTimestamp) / 1000, 0.03);
        if (deltaTime > 0 && isLaunched) {
            updateBall(deltaTime);
        }
        draw();
        lastTimestamp = timestamp;
        animFrame = requestAnimationFrame(animate);
    }
    
    // 滑块绑定
    const vSlider = document.getElementById("projectileVelocitySlider");
    const hSlider = document.getElementById("projectileHeightSlider");
    const vVal = document.getElementById("projectileVelocityValue");
    const hVal = document.getElementById("projectileHeightValue");
    
    if (vSlider && !vSlider.hasListener) {
        vSlider.addEventListener("input", (e) => {
            velocity = parseFloat(e.target.value);
            vVal.innerText = velocity.toFixed(1);
            if (!isLaunched) resetBall();
        });
        hSlider.addEventListener("input", (e) => {
            launchHeight = parseFloat(e.target.value);
            hVal.innerText = launchHeight.toFixed(1);
            if (!isLaunched) resetBall();
        });
        vSlider.hasListener = true;
    }
    
    // 动态添加控制面板（避免重复添加）
    const ctrlDiv = document.createElement("div");
    ctrlDiv.className = "projectile-extra";
    ctrlDiv.innerHTML = `
        <div style="display:flex; flex-wrap:wrap; gap:15px; justify-content:center; margin-top:10px;">
            <div>发射角: <input type="range" id="projectileAngle" min="-30" max="60" step="5" value="0"> <span id="projectileAngleVal">0</span>°</div>
            <button id="launchBtnV2" class="btn" style="padding:6px 16px;">🚀 发射</button>
            <button id="resetBtnV2" class="btn" style="padding:6px 16px;">🔄 重置</button>
        </div>
        <p style="margin-top:8px; font-size:12px; color:var(--text-light);">负角度向下斜抛，正角度向上斜抛</p>
    `;
    const existingCtrl = canvas.parentNode.querySelector(".projectile-extra");
    if (existingCtrl) existingCtrl.remove();
    canvas.parentNode.appendChild(ctrlDiv);
    
    const angleSlider = document.getElementById("projectileAngle");
    const angleVal = document.getElementById("projectileAngleVal");
    if (angleSlider && !angleSlider.hasListener) {
        angleSlider.addEventListener("input", (e) => {
            angleDeg = parseFloat(e.target.value);
            angleVal.innerText = angleDeg;
            if (!isLaunched) resetBall();
        });
        angleSlider.hasListener = true;
    }
    
    // 发射和重置按钮事件（使用事件委托避免重复绑定）
    const launchBtn = document.getElementById("launchBtnV2");
    const resetBtn = document.getElementById("resetBtnV2");
    if (launchBtn && !launchBtn.hasListener) {
        launchBtn.onclick = () => {
            isLaunched = true;
            resetBall();
        };
        resetBtn.onclick = () => {
            isLaunched = false;
            resetBall();
            trajectory = [];
            flightTime = 0;
        };
        launchBtn.hasListener = true;
    }
    
    window.addEventListener("resize", () => { draw(); if (!isLaunched) resetBall(); });
    
    resetBall();
    if (animFrame) cancelAnimationFrame(animFrame);
    animFrame = requestAnimationFrame(animate);
    window.__projectileCleanup = () => { if (animFrame) cancelAnimationFrame(animFrame); };
}

    // 向心力动画 15
function startCentripetalForceAnimation() {
    const canvas = document.getElementById("centripetalCanvas");
    if (!canvas) return;
    const ctx = canvas.getContext("2d");
    
    let mass = 0.5;            // kg
    let radius = 1.0;          // m
    let angularVelocity = 2.0; // rad/s
    let lastTimestamp = 0;
    let animFrame = null;
    
    function getCentripetalForce() {
        return mass * angularVelocity * angularVelocity * radius;
    }
    
    function draw() {
        const canvasWidth = canvas.clientWidth;
        const canvasHeight = canvas.clientHeight;
        canvas.width = canvasWidth;
        canvas.height = canvasHeight;
        
        ctx.clearRect(0, 0, canvasWidth, canvasHeight);
        const bgColor = getComputedStyle(document.body).getPropertyValue('--bg-light').trim() || "#fef9f0";
        ctx.fillStyle = bgColor;
        ctx.fillRect(0, 0, canvasWidth, canvasHeight);
        
        const centerX = canvasWidth / 2;
        const centerY = canvasHeight / 2;
        const circleRadius = Math.min(canvasWidth, canvasHeight) * 0.3;
        
        // 圆周
        ctx.beginPath();
        ctx.arc(centerX, centerY, circleRadius, 0, 2 * Math.PI);
        ctx.strokeStyle = "#ccc";
        ctx.lineWidth = 2;
        ctx.stroke();
        
        // 旋转物体（使用时间驱动，保证转速统一）
        const angle = Date.now() / 1000 * angularVelocity;
        const objX = centerX + circleRadius * Math.cos(angle);
        const objY = centerY + circleRadius * Math.sin(angle);
        ctx.beginPath();
        ctx.arc(objX, objY, 15, 0, 2 * Math.PI);
        ctx.fillStyle = "#e74c3c";
        ctx.fill();
        
        // 向心力箭头
        const forceArrowX = centerX + (circleRadius - 30) * Math.cos(angle);
        const forceArrowY = centerY + (circleRadius - 30) * Math.sin(angle);
        ctx.beginPath();
        ctx.moveTo(forceArrowX, forceArrowY);
        ctx.lineTo(centerX, centerY);
        ctx.strokeStyle = "#3498db";
        ctx.lineWidth = 3;
        ctx.stroke();
        
        const arrowAngle = Math.atan2(centerY - forceArrowY, centerX - forceArrowX);
        const arrowSize = 10;
        ctx.beginPath();
        ctx.moveTo(centerX, centerY);
        ctx.lineTo(centerX - arrowSize * Math.cos(arrowAngle - Math.PI/6),
                   centerY - arrowSize * Math.sin(arrowAngle - Math.PI/6));
        ctx.lineTo(centerX - arrowSize * Math.cos(arrowAngle + Math.PI/6),
                   centerY - arrowSize * Math.sin(arrowAngle + Math.PI/6));
        ctx.closePath();
        ctx.fillStyle = "#3498db";
        ctx.fill();
        
        // 数据
        ctx.fillStyle = "#2c2418";
        ctx.font = "bold 16px Arial";
        ctx.fillText(`质量: ${mass.toFixed(1)} kg`, 20, 40);
        ctx.fillText(`半径: ${radius.toFixed(1)} m`, 20, 80);
        ctx.fillText(`角速度: ${angularVelocity.toFixed(1)} rad/s`, 20, 120);
        ctx.fillStyle = "#e63946";
        ctx.fillText(`向心力: ${getCentripetalForce().toFixed(2)} N`, 20, 160);
    }
    
    function animate() {
        draw();
        animFrame = requestAnimationFrame(animate);
    }
    
    const massSlider = document.getElementById("centripetalMassSlider");
    const radiusSlider = document.getElementById("centripetalRadiusSlider");
    const omegaSlider = document.getElementById("centripetalOmegaSlider");
    const massVal = document.getElementById("centripetalMassValue");
    const radiusVal = document.getElementById("centripetalRadiusValue");
    const omegaVal = document.getElementById("centripetalOmegaValue");
    
    if (massSlider && !massSlider.hasListener) {
        massSlider.addEventListener("input", (e) => {
            mass = parseFloat(e.target.value);
            if (massVal) massVal.innerText = mass.toFixed(1);
        });
        radiusSlider.addEventListener("input", (e) => {
            radius = parseFloat(e.target.value);
            if (radiusVal) radiusVal.innerText = radius.toFixed(1);
        });
        omegaSlider.addEventListener("input", (e) => {
            angularVelocity = parseFloat(e.target.value);
            if (omegaVal) omegaVal.innerText = angularVelocity.toFixed(1);
        });
        massSlider.hasListener = true;
    }
    
    window.addEventListener("resize", () => draw());
    
    if (animFrame) cancelAnimationFrame(animFrame);
    animFrame = requestAnimationFrame(animate);
}

                ctx.moveTo(tickX, rulerY);
                ctx.lineTo(tickX, rulerY - tickHeight);
                ctx.strokeStyle = "#000";
                ctx.lineWidth = 1;

                    ctx.fillStyle = "#000";
                    ctx.font = "10px Arial";

            for (let i = 0; i < 10; i++) {
                const tickX = vernierX + (i / 10) * 20;
                ctx.beginPath();
                ctx.moveTo(tickX, caliperY);
                ctx.lineTo(tickX, caliperY - 5);
                ctx.stroke();
            }
        } else if (tool === "micrometer") {
            // 螺旋测微器示意（简单圆盘）

            const micY = objY + objHeight - 20;
            ctx.fillStyle = "#ccc";

            ctx.arc(micX, micY, 30, 0, 2*Math.PI);

    }
    
    window.addEventListener("resize", () => draw());
    draw();
}

    // 动量守恒动画 17
function startMomentumConservationAnimation() {
    const canvas = document.getElementById("momentumCanvas");
    if (!canvas) return;
    const ctx = canvas.getContext("2d");
    
    let mass1 = 1.0;      // kg
    let mass2 = 1.0;      // kg
    let velocity1 = 2.0;   // m/s
    let velocity2 = 0.0;   // m/s
    let position1 = 100;   // px
    let position2 = 300;   // px
    let collisionOccurred = false;
    
    function getInitialMomentum() {
        return mass1 * velocity1 + mass2 * velocity2;
    }
    
    function getFinalVelocity1() {
        return ((mass1 - mass2) * velocity1 + 2 * mass2 * velocity2) / (mass1 + mass2);
    }
    
    function getFinalVelocity2() {
        return ((mass2 - mass1) * velocity2 + 2 * mass1 * velocity1) / (mass1 + mass2);
    }
    
    function resetSimulation() {
        const w = canvas.clientWidth;
        position1 = 100;
        position2 = w - 100;  // 动态调整右侧初始位置
        collisionOccurred = false;
    }
    
    function draw() {
        const w = canvas.clientWidth;
        const h = canvas.clientHeight;
        canvas.width = w;

            position1 += velocity1 * 2;
            position2 += velocity2 * 2;

            }
        } else {

    // 单摆动画 18
function startPendulumAnimation() {
    const canvas = document.getElementById("pendulumCanvas");
    if (!canvas) return;
    const ctx = canvas.getContext("2d");
    
    let length = 1.0;           // m
    let angle = 25 * Math.PI / 180;   // rad
    let angularVelocity = 0;
    const g = 9.8;
    let time = 0;
    let periodStartTime = null;
    let lastPeriod = 0;
    let swingCount = 0;
    let animFrame = null;
    let lastTimestamp = 0;
    let pivotX = 0, pivotY = 0;
    let scale = 120;   // 1m = 120px（动态更新）
    
    function getPeriod() {
        return 2 * Math.PI * Math.sqrt(length / g);
    }
    
    function draw() {
        const w = canvas.clientWidth;
        const h = canvas.clientHeight;
        canvas.width = w;
        canvas.height = h;
        pivotX = w / 2;
        pivotY = 80;
        scale = Math.min(100, Math.max(60, h / 5));   // 动态缩放
        
        ctx.clearRect(0, 0, w, h);
        const bgColor = getComputedStyle(document.body).getPropertyValue('--bg-light').trim() || "#fef9f0";
        ctx.fillStyle = bgColor;
        ctx.fillRect(0, 0, w, h);
        
        // 悬挂点
        ctx.fillStyle = "#8B4513";
        ctx.beginPath();
        ctx.arc(pivotX, pivotY, 10, 0, 2*Math.PI);
        ctx.fill();
        
        // 摆球位置
        const bobX = pivotX + length * scale * Math.sin(angle);
        const bobY = pivotY + length * scale * Math.cos(angle);
        
        // 摆线
        ctx.beginPath();
        ctx.moveTo(pivotX, pivotY);
        ctx.lineTo(bobX, bobY);
        ctx.strokeStyle = "#8B4513";
        ctx.lineWidth = 2;
        ctx.stroke();
        
        // 摆球
        ctx.fillStyle = "#e74c3c";
        ctx.beginPath();
        ctx.arc(bobX, bobY, 18, 0, 2*Math.PI);
        ctx.fill();
        ctx.shadowColor = "#000";
        ctx.shadowBlur = 8;
        ctx.fill();
        ctx.shadowBlur = 0;
        
        // 角度弧线
        ctx.beginPath();
        ctx.arc(pivotX, pivotY, 50, -angle, 0, angle > 0);
        ctx.strokeStyle = "#3498db";
        ctx.lineWidth = 2;
        ctx.stroke();
        
        // 数据面板
        ctx.fillStyle = "#2c2418";
        ctx.font = "bold 16px Arial";
        ctx.fillText(`摆长 L = ${length.toFixed(2)} m`, 20, 40);
        ctx.fillText(`理论周期 T = ${getPeriod().toFixed(2)} s`, 20, 75);
        ctx.fillText(`当前角度: ${(angle * 180 / Math.PI).toFixed(1)}°`, 20, 110);
        ctx.fillText(`摆动次数: ${swingCount}`, 20, 145);
        if (lastPeriod > 0) {
            ctx.fillStyle = "#e63946";
            ctx.fillText(`实测周期: ${lastPeriod.toFixed(2)} s`, 20, 180);
        }
    }
    
    function updatePhysics(deltaTime) {
        const alpha = -(g / length) * Math.sin(angle);
        angularVelocity += alpha * deltaTime;
        angle += angularVelocity * deltaTime;
        time += deltaTime;
        
        if (angularVelocity > 0 && angle > 0 && periodStartTime === null) {
            periodStartTime = time;
        } else if (angularVelocity < 0 && angle < 0 && periodStartTime !== null) {
            const halfPeriod = time - periodStartTime;
            lastPeriod = halfPeriod * 2;
            swingCount++;
            periodStartTime = null;
        }
    }
    
    function animate(timestamp) {
        if (!lastTimestamp) lastTimestamp = timestamp;
        const deltaTime = Math.min((timestamp - lastTimestamp) / 1000, 0.02);
        if (deltaTime > 0) {
            updatePhysics(deltaTime);
        }
        draw();
        lastTimestamp = timestamp;
        animFrame = requestAnimationFrame(animate);
    }
    
    const lengthSlider = document.getElementById("pendulumLengthSlider");
    const angleSlider = document.getElementById("pendulumAngleSlider");
    const lengthVal = document.getElementById("pendulumLengthValue");
    const angleVal = document.getElementById("pendulumAngleValue");
    
    if (lengthSlider && !lengthSlider.hasListener) {
        lengthSlider.addEventListener("input", (e) => {
            length = parseFloat(e.target.value);
            lengthVal.innerText = length.toFixed(2);
            time = 0;
            swingCount = 0;
            periodStartTime = null;
            lastPeriod = 0;
        });
        angleSlider.addEventListener("input", (e) => {
            angle = parseFloat(e.target.value) * Math.PI / 180;
            angleVal.innerText = (angle * 180 / Math.PI).toFixed(1);
            angularVelocity = 0;
            time = 0;
            swingCount = 0;
            periodStartTime = null;
            lastPeriod = 0;
        });
        lengthSlider.hasListener = true;
    }
    
    window.addEventListener("resize", () => draw());
    
    if (animFrame) cancelAnimationFrame(animFrame);
    animFrame = requestAnimationFrame(animate);
    window.__pendulumCleanup = () => { if (animFrame) cancelAnimationFrame(animFrame); };
}

	//沸腾实验动画 20
function startBoilingAnimation() {
    const canvas = document.getElementById("boilingCanvas");
    if (!canvas) return;
    const ctx = canvas.getContext("2d");
    
    let temp = 20;
    let isHeating = false;
    let timeElapsed = 0;
    const dataPoints = [];
    const maxDataPoints = 50;
    let bubbles = [];
    let boilingTimer = null;
    
    function draw() {
        const w = canvas.clientWidth;
        const h = canvas.clientHeight;
        canvas.width = w;
        canvas.height = h;
        
        ctx.clearRect(0, 0, w, h);
        const bgColor = getComputedStyle(document.body).getPropertyValue('--bg-light').trim() || "#fef9f0";
        ctx.fillStyle = bgColor;
        ctx.fillRect(0, 0, w, h);
        
        // 烧杯
        ctx.fillStyle = "#ADD8E6";
        ctx.fillRect(w/2 - 80, h - 180, 160, 150);
        ctx.fillStyle = "#87CEEB";
        const waterHeight = 130 * (temp / 100);
        ctx.fillRect(w/2 - 80, h - 180 + 150 - waterHeight, 160, waterHeight);
        
        // 火焰（加热时）
        if (isHeating) {
            ctx.fillStyle = "#e67e22";
            ctx.beginPath();
            ctx.moveTo(w/2 - 40, h - 30);
            ctx.lineTo(w/2, h - 10);
            ctx.lineTo(w/2 + 40, h - 30);
            ctx.fill();
            ctx.fillStyle = "#f1c40f";
            ctx.beginPath();
            ctx.moveTo(w/2 - 20, h - 30);
            ctx.lineTo(w/2, h - 15);
            ctx.lineTo(w/2 + 20, h - 30);
            ctx.fill();
        }
        
        // 气泡（沸腾时）
        if (temp >= 100) {
            if (Math.random() < 0.5) {
                bubbles.push({
                    x: w/2 - 40 + Math.random() * 80,
                    y: h - 180 + 130 - Math.random() * 100,
                    r: 2 + Math.random() * 6,
                    speed: 0.5 + Math.random() * 2
                });
            }
            bubbles = bubbles.filter(b => {
                b.y -= b.speed;
                if (b.y < h - 180) return false;
                ctx.beginPath();
                ctx.arc(b.x, b.y, b.r, 0, 2*Math.PI);
                ctx.fillStyle = "rgba(255,255,255,0.7)";
                ctx.fill();
                ctx.strokeStyle = "#aaa";
                ctx.stroke();
                return true;
            });
        } else {
            bubbles = [];
        }
        
        // 温度计显示
        ctx.fillStyle = "#ddd";
        ctx.fillRect(50, 60, 20, 120);
        ctx.fillStyle = "red";
        const liquidH = (temp / 100) * 120;
        ctx.fillRect(52, 60 + 120 - liquidH, 16, liquidH);
        ctx.fillStyle = "#000";
        ctx.font = "bold 14px Arial";
        ctx.fillText(`${temp.toFixed(1)}°C`, 40, 200);
        
        // 状态文字
        ctx.font = "bold 16px Arial";
        ctx.fillStyle = "#2c2418";
        if (temp >= 100) {
            ctx.fillStyle = "#e74c3c";
            ctx.fillText("沸腾中！温度保持100℃", w/2 - 80, 50);
        } else if (isHeating) {
            ctx.fillText("加热中...", w/2 - 40, 50);
        } else {
            ctx.fillText("待加热", w/2 - 30, 50);
        }
        
        // 温度-时间曲线
        drawGraph(ctx, w, h, dataPoints);
    }
    
    function drawGraph(ctx, w, h, points) {
        const graphX = w - 220, graphY = 80, graphW = 200, graphH = 100;
        ctx.fillStyle = "rgba(255,255,255,0.8)";
        ctx.fillRect(graphX - 10, graphY - 10, graphW + 20, graphH + 20);
        ctx.strokeStyle = "#333";
        ctx.strokeRect(graphX, graphY, graphW, graphH);
        if (points.length < 2) return;
        ctx.beginPath();
        ctx.moveTo(graphX, graphY + graphH - (points[0].temp / 100) * graphH);
        for (let i = 1; i < points.length; i++) {
            const x = graphX + (i / (points.length - 1)) * graphW;
            const y = graphY + graphH - (points[i].temp / 100) * graphH;
            ctx.lineTo(x, y);
        }
        ctx.strokeStyle = "#e74c3c";
        ctx.lineWidth = 2;
        ctx.stroke();
        ctx.fillStyle = "#000";
        ctx.font = "10px Arial";
        ctx.fillText("时间(s)", graphX + graphW - 30, graphY + graphH + 15);
        ctx.fillText("T(°C)", graphX - 20, graphY + 10);
    }
    
    function heatStep() {
        if (isHeating && temp < 100) {
            temp = Math.min(temp + 0.8, 100);
            timeElapsed += 0.1;
            dataPoints.push({ temp, time: timeElapsed });
            if (dataPoints.length > maxDataPoints) dataPoints.shift();
            draw();
            boilingTimer = setTimeout(heatStep, 100);
        } else if (isHeating) {
            // 沸腾后保持温度，继续记录时间
            timeElapsed += 0.1;
            dataPoints.push({ temp, time: timeElapsed });
            if (dataPoints.length > maxDataPoints) dataPoints.shift();
            draw();
            boilingTimer = setTimeout(heatStep, 100);
        }
    }
    
    const heatBtn = document.getElementById("heatBtn");
    const resetBtn = document.getElementById("resetBtn");
    
    if (heatBtn && !heatBtn.hasListener) {
        heatBtn.onclick = () => {
            if (boilingTimer) clearTimeout(boilingTimer);
            isHeating = true;
            heatStep();
        };
        resetBtn.onclick = () => {
            if (boilingTimer) clearTimeout(boilingTimer);
            isHeating = false;
            temp = 20;
            timeElapsed = 0;
            dataPoints.length = 0;
            bubbles = [];
            draw();
        };
        heatBtn.hasListener = true;
    }
    
    window.addEventListener("resize", () => draw());
    draw();
}

	//光的反射定律动画 23
function startReflectionAnimation() {
    const canvas = document.getElementById("reflectionCanvas");
    if (!canvas) return;
    const ctx = canvas.getContext("2d");
    
    let incidentAngle = 30;  // 度
    let reflectAngle = incidentAngle;
    
    function draw() {
        const w = canvas.clientWidth;
        const h = canvas.clientHeight;
        canvas.width = w;
        canvas.height = h;
        
        ctx.clearRect(0, 0, w, h);
        const bgColor = getComputedStyle(document.body).getPropertyValue('--bg-light').trim() || "#fef9f0";
        ctx.fillStyle = bgColor;
        ctx.fillRect(0, 0, w, h);
        
        // 镜面
        ctx.beginPath();
        ctx.moveTo(w/2 - 150, h/2);
        ctx.lineTo(w/2 + 150, h/2);
        ctx.lineWidth = 3;
        ctx.strokeStyle = "#888";
        ctx.stroke();
        
        // 法线
        ctx.beginPath();
        ctx.moveTo(w/2, h/2 - 100);
        ctx.lineTo(w/2, h/2 + 100);
        ctx.setLineDash([5, 5]);
        ctx.stroke();
        ctx.setLineDash([]);
        
        // 入射光线
        const rad = incidentAngle * Math.PI / 180;
        const len = 120;
        const inX = w/2 - len * Math.sin(rad);
        const inY = h/2 - len * Math.cos(rad);
        ctx.beginPath();
        ctx.moveTo(w/2, h/2);
        ctx.lineTo(inX, inY);
        ctx.strokeStyle = "#e74c3c";
        ctx.lineWidth = 2;
        ctx.stroke();
        
        // 反射光线
        const outX = w/2 + len * Math.sin(rad);
        const outY = h/2 - len * Math.cos(rad);
        ctx.beginPath();
        ctx.moveTo(w/2, h/2);
        ctx.lineTo(outX, outY);
        ctx.strokeStyle = "#3498db";
        ctx.stroke();
        
        // 角度标注
        ctx.fillStyle = "#000";
        ctx.font = "14px Arial";
        ctx.fillText(`入射角 i = ${incidentAngle}°`, w/2 - 100, h/2 - 50);
        ctx.fillText(`反射角 r = ${reflectAngle}°`, w/2 - 100, h/2 - 20);
        ctx.fillStyle = "#e74c3c";
        ctx.fillText("入射光线", inX - 40, inY - 10);
        ctx.fillStyle = "#3498db";

	//凸透镜成像的规律动画 25
function startLensAnimation() {
    const canvas = document.getElementById("lensCanvas");
    if (!canvas) return;
    const ctx = canvas.getContext("2d");
    
    let u = 80;              // 物距 (px)
    const f = 40;            // 焦距 (px) - 固定
    let isDragging = false;
    
    function calculateImage() {
        if (u === f) return { v: Infinity, mag: Infinity, type: "不成像" };
        const v = 1 / ((1/f) - (1/u));
        const mag = Math.abs(v / u);
        let type = "";
        if (u > 2*f) type = "倒立缩小实像";
        else if (Math.abs(u - 2*f) < 1) type = "倒立等大实像";
        else if (u > f) type = "倒立放大实像";
        else type = "正立放大虚像";
        return { v, mag, type };
    }
    
    function draw() {
        const w = canvas.clientWidth;
        const h = canvas.clientHeight;
        canvas.width = w;
        canvas.height = h;
        const lensX = w / 2;
        const axisY = h / 2;
        
        ctx.clearRect(0, 0, w, h);
        const bgColor = getComputedStyle(document.body).getPropertyValue('--bg-light').trim() || "#fef9f0";
        ctx.fillStyle = bgColor;
        ctx.fillRect(0, 0, w, h);
        
        // 主光轴
        ctx.beginPath();
        ctx.moveTo(20, axisY);
        ctx.lineTo(w - 20, axisY);
        ctx.strokeStyle = "#333";
        ctx.lineWidth = 1.5;
        ctx.stroke();
        
        // 凸透镜
        ctx.fillStyle = "#ADD8E6";
        ctx.fillRect(lensX - 12, axisY - 80, 24, 160);
        ctx.strokeStyle = "#2c3e50";
        ctx.lineWidth = 2;
        ctx.strokeRect(lensX - 12, axisY - 80, 24, 160);
        ctx.fillStyle = "#2c3e50";
        ctx.font = "12px Arial";
        ctx.fillText("凸透镜", lensX - 20, axisY - 95);
        
        // 焦点
        const leftF = lensX - f;
        const rightF = lensX + f;
        ctx.fillStyle = "#f39c12";
        ctx.beginPath();
        ctx.arc(leftF, axisY, 4, 0, 2*Math.PI);
        ctx.fill();
        ctx.beginPath();
        ctx.arc(rightF, axisY, 4, 0, 2*Math.PI);
        ctx.fill();
        ctx.fillStyle = "#2c3e50";
        ctx.font = "12px Arial";
        ctx.fillText("F", leftF - 15, axisY - 10);
        ctx.fillText("F'", rightF + 5, axisY - 10);
        
        // 物体
        const objX = lensX - u;
        if (objX > 10) {
            ctx.fillStyle = "#e74c3c";
            ctx.fillRect(objX, axisY - 30, 12, 60);
            ctx.fillStyle = "#f1c40f";
            ctx.beginPath();
            ctx.arc(objX + 6, axisY - 35, 8, 0, 2*Math.PI);
            ctx.fill();
            ctx.fillStyle = "#fff";
            ctx.font = "10px Arial";
            ctx.fillText("物体", objX + 2, axisY - 40);
        }
        
        // 成像
        const img = calculateImage();
        if (img.type !== "不成像" && isFinite(img.v)) {
            let imgX, imgHeight;
            const objHeight = 60;
            if (img.type === "正立放大虚像") {
                imgX = lensX - img.v;
                imgHeight = objHeight * img.mag;
                ctx.fillStyle = "#3498db";
                ctx.globalAlpha = 0.5;
                ctx.fillRect(imgX, axisY - imgHeight/2, 12, imgHeight);
                ctx.globalAlpha = 1.0;
                ctx.setLineDash([5, 5]);
                ctx.beginPath();
                ctx.moveTo(objX + 6, axisY);
                ctx.lineTo(imgX + 6, axisY);
                ctx.strokeStyle = "#3498db";
                ctx.stroke();
                ctx.setLineDash([]);
            } else {
                imgX = lensX + img.v;
                imgHeight = objHeight * img.mag;
                ctx.fillStyle = "#3498db";
                ctx.fillRect(imgX, axisY - imgHeight/2, 12, imgHeight);
            }
            ctx.fillStyle = "#fff";
            ctx.font = "10px Arial";
            ctx.fillText(img.type, imgX + 2, axisY - imgHeight/2 - 5);
        }
        
        // 数据面板
        ctx.fillStyle = "#2c2418";
        ctx.font = "bold 14px Arial";
        ctx.fillText(`物距 u = ${u} px`, 20, 40);
        ctx.fillText(`焦距 f = ${f} px`, 20, 70);
        if (img.type !== "不成像" && isFinite(img.v)) {
            ctx.fillText(`像距 v = ${Math.abs(img.v).toFixed(1)} px`, 20, 100);
            ctx.fillText(`放大率 |M| = ${img.mag.toFixed(2)}`, 20, 130);
            ctx.fillStyle = "#e63946";
            ctx.fillText(`成像: ${img.type}`, 20, 160);
        } else {
            ctx.fillStyle = "#e63946";
            ctx.fillText("不成像 (u = f)", 20, 100);
        }
    }
    
    function setU(newU) {
        u = Math.min(300, Math.max(15, newU));
        const uSlider = document.getElementById("objectDist");
        const uVal = document.getElementById("objectDistVal");
        if (uSlider) uSlider.value = u;
        if (uVal) uVal.innerText = u;
        draw();
    }
    
    const uSlider = document.getElementById("objectDist");
    if (uSlider && !uSlider.hasListener) {
        uSlider.addEventListener("input", (e) => {
            setU(parseFloat(e.target.value));
        });
        uSlider.hasListener = true;
    }
    
    // 拖拽物体
    const handleMouseDown = (e) => {
        const rect = canvas.getBoundingClientRect();
        const mouseX = (e.clientX - rect.left) * (canvas.width / rect.width);
        const lensX = canvas.width / 2;
        const objX = lensX - u;
        if (Math.abs(mouseX - (objX + 6)) < 20) {
            isDragging = true;
            canvas.style.cursor = "grabbing";
            e.preventDefault();
        }
    };
    const handleMouseMove = (e) => {
        if (isDragging) {
            const rect = canvas.getBoundingClientRect();
            const mouseX = (e.clientX - rect.left) * (canvas.width / rect.width);
            const lensX = canvas.width / 2;
            const newU = lensX - mouseX;
            setU(newU);
            e.preventDefault();
        }
    };
    const handleMouseUp = () => {
        isDragging = false;
        canvas.style.cursor = "default";
    };
    
    canvas.addEventListener("mousedown", handleMouseDown);
    canvas.addEventListener("mousemove", handleMouseMove);
    canvas.addEventListener("mouseup", handleMouseUp);
    canvas.addEventListener("mouseleave", handleMouseUp);
    
    // 清理旧监听器（防止重复添加）
    if (canvas.__lensListeners) {
        canvas.removeEventListener("mousedown", canvas.__lensListeners.mousedown);
        canvas.removeEventListener("mousemove", canvas.__lensListeners.mousemove);
        canvas.removeEventListener("mouseup", canvas.__lensListeners.mouseup);
        canvas.removeEventListener("mouseleave", canvas.__lensListeners.mouseleave);
    }
    canvas.__lensListeners = {
        mousedown: handleMouseDown,
        mousemove: handleMouseMove,
        mouseup: handleMouseUp,
        mouseleave: handleMouseUp
    };
    
    window.addEventListener("resize", () => draw());
    draw();
}

function startRefractiveAnimation() {

    let incidentAngle = 30; // 度

        return Math.asin(Math.sin(incidentAngle * Math.PI / 180) / n) * 180 / Math.PI;
    }
    
    function draw() {
        const w = canvas.clientWidth;
        const h = canvas.clientHeight;

	//探究串联电路和并联电路中电流、电压的特点动画 31
function startCircuitAnimation() {
    const canvas = document.getElementById("circuitCanvas");
    if (!canvas) return;
    const ctx = canvas.getContext("2d");
    
    let mode = "series";   // "series" 或 "parallel"
    let voltage = 9.0;     // V
    let r1 = 10.0, r2 = 20.0;   // Ω
    
    function getCurrents() {
        if (mode === "series") {
            const R = r1 + r2;
            const I = voltage / R;
            return { I1: I, I2: I, U1: I * r1, U2: I * r2, U: voltage };
        } else {
            const I1 = voltage / r1;
            const I2 = voltage / r2;
            const I = I1 + I2;
            return { I1, I2, I, U1: voltage, U2: voltage, U: voltage };
        }
    }

	//探究导体在磁场中运动时产生感应电流的条件（电磁感应）动画 33
function startInductionAnimation() {
    const canvas = document.getElementById("inductionCanvas");
    if (!canvas) return;
    const ctx = canvas.getContext("2d");
    
    // 物理参数（可调）
    let B = 0.8;           // 磁感应强度 (T)
    let L = 0.1;           // 导体有效长度 (m)
    let R = 10;            // 回路电阻 (Ω)
    
    let magnet = { x: 0, y: 0 };
    let isDragging = false;
    let velocity = 0;
    let lastX = 0;
    let current = 0;
    let emf = 0;
    let animFrame = null;
    let width = 0, height = 0;
    let coilX = 0, coilWidth = 80;
    
    function calculateValues(v) {
        const rawEmf = B * L * Math.abs(v) * 30;
        const emfVal = Math.min(rawEmf, 2.0);
        const currentVal = emfVal / R;
        return { emf: emfVal * Math.sign(v), current: currentVal * Math.sign(v) };
    }
    
    function draw() {
        width = canvas.clientWidth;
        height = canvas.clientHeight;
        canvas.width = width;
        canvas.height = height;
        
        coilX = width/2 - 40;
        const coilY = height/2 - 50;
        
        ctx.clearRect(0, 0, width, height);
        const bgColor = getComputedStyle(document.body).getPropertyValue('--bg-light').trim() || "#fef9f0";
        ctx.fillStyle = bgColor;
        ctx.fillRect(0, 0, width, height);
        
        // 均匀磁场区域
        ctx.fillStyle = "rgba(52, 152, 219, 0.08)";
        ctx.fillRect(coilX - 40, height/2 - 70, coilWidth + 80, 140);
        ctx.strokeStyle = "#3498db";
        ctx.setLineDash([5, 5]);
        ctx.strokeRect(coilX - 40, height/2 - 70, coilWidth + 80, 140);
        ctx.setLineDash([]);
        
        // 磁感线
        ctx.strokeStyle = "#3498db";
        ctx.lineWidth = 1;
        ctx.setLineDash([2, 4]);
        for (let i = 0; i < 6; i++) {
            const x = coilX - 30 + i * 25;
            ctx.beginPath();
            ctx.moveTo(x, height/2 - 60);
            ctx.lineTo(x, height/2 + 60);
            ctx.stroke();
        }
        ctx.setLineDash([]);
        
        // 线圈
        ctx.fillStyle = "#bdc3c7";
        ctx.fillRect(coilX, height/2 - 50, coilWidth, 100);
        ctx.strokeStyle = "#2c3e50";
        ctx.lineWidth = 3;
        ctx.strokeRect(coilX, height/2 - 50, coilWidth, 100);
        ctx.fillStyle = "#2c3e50";
        ctx.font = "bold 14px Arial";
        ctx.fillText("线圈", coilX + 20, height/2);
        ctx.font = "12px Arial";
        ctx.fillText(`L = ${L.toFixed(2)} m`, coilX + 15, height/2 + 25);
        
        ctx.fillStyle = "#3498db";
        ctx.font = "bold 12px Arial";
        ctx.fillText(`B = ${B.toFixed(2)} T`, coilX - 20, height/2 - 75);
        
        // 磁铁
        const magnetCenter = magnet.x + 40;
        ctx.fillStyle = "#e74c3c";
        ctx.fillRect(magnet.x, magnet.y, 40, 60);
        ctx.fillStyle = "#3498db";
        ctx.fillRect(magnet.x + 40, magnet.y, 40, 60);
        ctx.fillStyle = "#fff";
        ctx.font = "bold 14px Arial";
        ctx.fillText("N", magnet.x + 10, magnet.y + 25);
        ctx.fillText("S", magnet.x + 50, magnet.y + 25);
        
        // 速度矢量
        if (Math.abs(velocity) > 0.3) {
            const arrowX = magnetCenter;
            const arrowY = magnet.y - 25;
            const arrowLen = velocity * 6;
            ctx.beginPath();
            ctx.moveTo(arrowX, arrowY);
            ctx.lineTo(arrowX + arrowLen, arrowY);
            ctx.strokeStyle = "#e67e22";
            ctx.lineWidth = 3;
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(arrowX + arrowLen, arrowY);
            ctx.lineTo(arrowX + arrowLen - 8 * Math.sign(velocity), arrowY - 5);
            ctx.lineTo(arrowX + arrowLen - 8 * Math.sign(velocity), arrowY + 5);
            ctx.fillStyle = "#e67e22";
            ctx.fill();
            ctx.fillStyle = "#e67e22";
            ctx.font = "bold 12px Arial";
            const speedMs = (Math.abs(velocity) * 0.03).toFixed(2);
            ctx.fillText(`${speedMs} m/s`, arrowX + arrowLen/2 - 15, arrowY - 8);
        }
        
        // 电流表
        const meterX = width - 100;
        const meterY = height/2;
        ctx.beginPath();
        ctx.arc(meterX, meterY, 45, 0, 2*Math.PI);
        ctx.fillStyle = "#ecf0f1";
        ctx.fill();
        ctx.strokeStyle = "#2c3e50";
        ctx.lineWidth = 2;
        ctx.stroke();
        
        for (let i = -2; i <= 2; i++) {
            const tickAngle = i * 0.35;
            const tickX = meterX + 35 * Math.sin(tickAngle);
            const tickY = meterY - 35 * Math.cos(tickAngle);
            ctx.fillStyle = "#2c3e50";
            ctx.font = "10px Arial";
            ctx.fillText((i*0.2).toFixed(1), tickX - 8, tickY + 3);
        }
        
        const maxCurrent = 0.5;
        const angle = (current / maxCurrent) * 0.8;
        const needleX = meterX + 30 * Math.sin(angle);
        const needleY = meterY - 30 * Math.cos(angle);
        ctx.beginPath();
        ctx.moveTo(meterX, meterY);
        ctx.lineTo(needleX, needleY);
        ctx.strokeStyle = "#e74c3c";
        ctx.lineWidth = 3;
        ctx.stroke();
        ctx.beginPath();
        ctx.arc(meterX, meterY, 4, 0, 2*Math.PI);
        ctx.fillStyle = "#e74c3c";
        ctx.fill();
        ctx.fillStyle = "#2c2418";
        ctx.font = "bold 14px Arial";
        ctx.fillText(`${Math.abs(current).toFixed(3)} A`, meterX - 25, meterY + 55);
        
        // 数据面板
        ctx.fillStyle = "#2c2418";
        ctx.font = "bold 14px Arial";
        ctx.fillText("📊 实时数据", 20, 40);
        ctx.font = "13px Arial";
        ctx.fillText(`感应电动势 E = BLv = ${Math.abs(emf).toFixed(3)} V`, 20, 70);
        ctx.fillText(`感应电流 I = E/R = ${Math.abs(current).toFixed(3)} A`, 20, 100);
        ctx.fillText(`方向: ${current > 0 ? "正向 →" : current < 0 ? "反向 ←" : "无"}`, 20, 130);
        ctx.fillText(`磁通量变化率 dΦ/dt = ${Math.abs(emf).toFixed(3)} Wb/s`, 20, 160);
        
        if (Math.abs(velocity) > 0.3) {
            ctx.fillStyle = "#e63946";
            ctx.font = "bold 13px Arial";
            ctx.fillText("⚡ 切割磁感线，产生感应电流", 20, 200);
        } else {
            ctx.fillStyle = "#7f8c8d";
            ctx.font = "13px Arial";
            ctx.fillText("静止，无感应电流", 20, 200);
        }
    }
    
    function updateValues() {
        const coilLeft = coilX;
        const coilRight = coilX + coilWidth;
        const magnetCenter = magnet.x + 40;
        if (magnetCenter > coilLeft - 30 && magnetCenter < coilRight + 30) {
            const vals = calculateValues(velocity);
            emf = vals.emf;
            current = vals.current;
        } else {
            emf = 0;
            current = 0;
        }
    }
    
    function animate() {
        if (isDragging) {
            velocity = (magnet.x - lastX) * 1.5;
            lastX = magnet.x;
            updateValues();
        } else {
            velocity *= 0.92;
            if (Math.abs(velocity) < 0.1) velocity = 0;
            updateValues();
        }
        draw();
        animFrame = requestAnimationFrame(animate);
    }
    
    // 拖拽交互（鼠标 + 触摸）
    function handleDragStart(e) {
        const rect = canvas.getBoundingClientRect();
        const clientX = e.clientX ?? (e.touches ? e.touches[0].clientX : 0);
        const clientY = e.clientY ?? (e.touches ? e.touches[0].clientY : 0);
        const mouseX = (clientX - rect.left) * (canvas.width / rect.width);
        const mouseY = (clientY - rect.top) * (canvas.height / rect.height);
        if (mouseX >= magnet.x && mouseX <= magnet.x + 80 && mouseY >= magnet.y && mouseY <= magnet.y + 60) {
            isDragging = true;
            lastX = magnet.x;
            canvas.style.cursor = "grabbing";
            e.preventDefault();
        }
    }
    function handleDragMove(e) {
        if (isDragging) {
            const rect = canvas.getBoundingClientRect();
            const clientX = e.clientX ?? (e.touches ? e.touches[0].clientX : 0);
            const mouseX = (clientX - rect.left) * (canvas.width / rect.width);
            magnet.x = Math.min(Math.max(mouseX - 40, 20), canvas.width - 100);
            e.preventDefault();
        }
    }
    function handleDragEnd() {
        isDragging = false;
        canvas.style.cursor = "default";
    }
    
    canvas.addEventListener("mousedown", handleDragStart);
    window.addEventListener("mousemove", handleDragMove);
    window.addEventListener("mouseup", handleDragEnd);
    canvas.addEventListener("touchstart", handleDragStart);
    canvas.addEventListener("touchmove", handleDragMove);
    canvas.addEventListener("touchend", handleDragEnd);
    
    // 参数控制面板（只添加一次）
    let ctrlDiv = canvas.parentNode.querySelector(".induction-params");
    if (!ctrlDiv) {
        ctrlDiv = document.createElement("div");
        ctrlDiv.className = "induction-params";
        ctrlDiv.innerHTML = `
            <div style="display:flex; flex-wrap:wrap; gap:15px; justify-content:center; margin-top:10px;">
                <div>B: <input type="range" id="inductionB" min="0.2" max="1.5" step="0.1" value="0.8"> <span id="inductionBVal">0.8</span> T</div>
                <div>L: <input type="range" id="inductionL" min="0.05" max="0.3" step="0.01" value="0.1"> <span id="inductionLVal">0.10</span> m</div>
                <div>R: <input type="range" id="inductionR" min="1" max="50" step="1" value="10"> <span id="inductionRVal">10</span> Ω</div>
                <button id="inductionReset" class="btn" style="padding:4px 12px;">⟲ 复位</button>
            </div>
        `;
        canvas.parentNode.appendChild(ctrlDiv);
    }
    
    const bSlider = document.getElementById("inductionB");
    const lSlider = document.getElementById("inductionL");
    const rSlider = document.getElementById("inductionR");
    const resetBtn = document.getElementById("inductionReset");
    
    if (bSlider && !bSlider.hasListener) {
        bSlider.addEventListener("input", (e) => { B = parseFloat(e.target.value); document.getElementById("inductionBVal").innerText = B.toFixed(2); updateValues(); draw(); });
        lSlider.addEventListener("input", (e) => { L = parseFloat(e.target.value); document.getElementById("inductionLVal").innerText = L.toFixed(2); updateValues(); draw(); });
        rSlider.addEventListener("input", (e) => { R = parseFloat(e.target.value); document.getElementById("inductionRVal").innerText = R.toFixed(1); updateValues(); draw(); });
        resetBtn.onclick = () => {
            magnet.x = canvas.width/2 - 80;
            velocity = 0;
            emf = 0;
            current = 0;
            lastX = magnet.x;
            draw();
        };
        bSlider.hasListener = true;
    }
    
    // 初始化位置
    magnet.x = canvas.clientWidth/2 - 80;
    magnet.y = canvas.clientHeight/2 - 30;
    lastX = magnet.x;
    
    window.addEventListener("resize", () => { 
        magnet.x = canvas.clientWidth/2 - 80;
        magnet.y = canvas.clientHeight/2 - 30;
        draw(); 
    });
    
    if (animFrame) cancelAnimationFrame(animFrame);
    animFrame = requestAnimationFrame(animate);
    window.__inductionCleanup = () => { if (animFrame) cancelAnimationFrame(animFrame); };
}

	//观察电容器的充、放电现象动画 34
function startCapacitorAnimation() {
    const canvas = document.getElementById("capacitorCanvas");
    if (!canvas) return;
    const ctx = canvas.getContext("2d");
    
    let voltage = 0;
    const maxVoltage = 12;
    const R = 1000;
    const C = 0.001;
    let isCharging = false;
    let isDischarging = false;
    let animFrame = null;
    let lastTimestamp = 0;
    
    function draw() {
        const w = canvas.clientWidth;
        const h = canvas.clientHeight;
        canvas.width = w;
        canvas.height = h;
        
        ctx.clearRect(0, 0, w, h);
        const bgColor = getComputedStyle(document.body).getPropertyValue('--bg-light').trim() || "#fef9f0";
        ctx.fillStyle = bgColor;
        ctx.fillRect(0, 0, w, h);
        
        // 电容器符号
        ctx.fillStyle = "#333";
        ctx.fillRect(w/2 - 60, h/2 - 30, 120, 60);
        ctx.fillStyle = "#f1c40f";
        ctx.fillRect(w/2 - 40, h/2 - 20, 80, 40);
        ctx.fillStyle = "#000";
        ctx.font = "bold 14px Arial";
        ctx.fillText("电容器", w/2 - 30, h/2);
        
        ctx.fillStyle = "#e74c3c";
        ctx.fillRect(w/2 - 30, h/2 - 15, 5, 30);
        ctx.fillStyle = "#3498db";
        ctx.fillRect(w/2 + 25, h/2 - 15, 5, 30);
        
        // 电压表
        const centerX = w/2 + 130;
        const centerY = h/2;
        ctx.beginPath();
        ctx.arc(centerX, centerY, 50, 0, 2*Math.PI);
        ctx.fillStyle = "#ecf0f1";
        ctx.fill();
        ctx.stroke();
        const angle = -Math.PI/2 + (voltage / maxVoltage) * Math.PI;
        const needleX = centerX + 40 * Math.cos(angle);
        const needleY = centerY + 40 * Math.sin(angle);
        ctx.beginPath();
        ctx.moveTo(centerX, centerY);
        ctx.lineTo(needleX, needleY);
        ctx.strokeStyle = "#e74c3c";
        ctx.lineWidth = 3;
        ctx.stroke();
        ctx.fillStyle = "#2c2418";
        ctx.font = "bold 14px Arial";
        ctx.fillText(`${voltage.toFixed(2)} V`, centerX - 20, centerY + 60);
        
        // 状态文字
        ctx.font = "bold 16px Arial";
        if (isCharging) {
            ctx.fillStyle = "#27ae60";
            ctx.fillText("充电中...", 30, 50);
        } else if (isDischarging) {
            ctx.fillStyle = "#e67e22";
            ctx.fillText("放电中...", 30, 50);
        } else {
            ctx.fillStyle = "#7f8c8d";
            ctx.fillText("待机", 30, 50);
        }
        
        // 电量指示条
        ctx.fillStyle = "#bdc3c7";
        ctx.fillRect(30, 80, 150, 20);
        ctx.fillStyle = voltage > 0 ? "#3498db" : "#bdc3c7";
        ctx.fillRect(30, 80, (voltage / maxVoltage) * 150, 20);
        ctx.strokeStyle = "#2c3e50";
        ctx.strokeRect(30, 80, 150, 20);
    }
    
    function updateCharge(deltaTime) {
        const tau = R * C;
        if (isCharging) {
            voltage = maxVoltage - (maxVoltage - voltage) * Math.exp(-deltaTime / tau);
            if (voltage > maxVoltage * 0.99) voltage = maxVoltage;
        } else if (isDischarging) {
            voltage = voltage * Math.exp(-deltaTime / tau);
            if (voltage < 0.01) voltage = 0;
        }
    }
    
    function animate(timestamp) {
        if (!lastTimestamp) lastTimestamp = timestamp;
        const deltaTime = Math.min((timestamp - lastTimestamp) / 1000, 0.1);
        if (deltaTime > 0 && (isCharging || isDischarging)) {
            updateCharge(deltaTime);
        }
        draw();
        lastTimestamp = timestamp;
        animFrame = requestAnimationFrame(animate);
    }
    
    const chargeBtn = document.getElementById("chargeBtn");
    const dischargeBtn = document.getElementById("dischargeBtn");
    if (chargeBtn && !chargeBtn.hasListener) {
        chargeBtn.onclick = () => { isCharging = true; isDischarging = false; };
        dischargeBtn.onclick = () => { isCharging = false; isDischarging = true; };
        chargeBtn.hasListener = true;
    }
    
    window.addEventListener("resize", () => draw());
    if (animFrame) cancelAnimationFrame(animFrame);
    animFrame = requestAnimationFrame(animate);
    window.__capacitorCleanup = () => { if (animFrame) cancelAnimationFrame(animFrame); };
}

    let blockX = 80;
    let blockY = 0, blockWidth = 80;
    
    function getFriction(surf, p) {
        const normal = 2 + p * 2;
        let mu = 0.3;
        if (surf === "毛巾") mu = 0.6;
        if (surf === "玻璃") mu = 0.2;
        return mu * normal;
    }
    
    function draw() {
        const w = canvas.clientWidth;
        const h = canvas.clientHeight;
        canvas.width = w;
        canvas.height = h;
        blockY = h - 110;
        
        ctx.clearRect(0, 0, w, h);
        const bgColor = getComputedStyle(document.body).getPropertyValue('--bg-light').trim() || "#fef9f0";
        ctx.fillStyle = bgColor;
        ctx.fillRect(0, 0, w, h);
        
        // 接触面
        ctx.fillStyle = "#C0A080";
        if (surface === "毛巾") ctx.fillStyle = "#e74c3c";
        if (surface === "玻璃") ctx.fillStyle = "#3498db";
        ctx.fillRect(50, blockY - 5, w - 100, 20);
        ctx.fillStyle = "#fff";
        ctx.font = "12px Arial";
        ctx.fillText(surface, 60, blockY + 8);
        
        // 木块
        ctx.fillStyle = "#8B4513";
        ctx.fillRect(blockX, blockY - 30, blockWidth, 30);
        ctx.fillStyle = "#fff";
        ctx.font = "10px Arial";
        ctx.fillText("木块", blockX + 5, blockY - 12);
        for (let i = 0; i < pressure; i++) {
            ctx.fillStyle = "#f1c40f";
            ctx.fillRect(blockX + 15 + i * 15, blockY - 45, 12, 12);
        }
        
        // 测力计
        const friction = getFriction(surface, pressure);
        const scaleX = blockX + blockWidth + 20;
        ctx.fillStyle = "#888";
        ctx.fillRect(scaleX, blockY - 25, 120, 15);
        ctx.fillStyle = "#ccc";
        ctx.fillRect(scaleX + 2, blockY - 23, 116, 11);
        const needlePos = scaleX + 10 + friction * 15;
        ctx.fillStyle = "#e74c3c";
        ctx.fillRect(needlePos, blockY - 28, 3, 18);
        ctx.fillStyle = "#000";
        ctx.font = "11px Arial";
        ctx.fillText("0", scaleX + 5, blockY - 5);
        ctx.fillText("8N", scaleX + 10 + 8 * 15, blockY - 5);
        
        // 实时数据
        ctx.fillStyle = "#2c2418";
        ctx.font = "bold 15px Arial";
        ctx.fillText(`压力: ${(2 + pressure * 2).toFixed(0)} N`, 20, 40);
        ctx.fillText(`摩擦力: ${friction.toFixed(2)} N`, 20, 70);
        
        // 记录表格与散点图
        if (records.length > 0) {
            ctx.font = "12px Arial";
            ctx.fillText("记录 (接触面/压力/摩擦力)", 20, 110);
            let yOff = 130;
            records.forEach((r, i) => {
                ctx.fillText(`${i+1}. ${r.surface} ${r.pressure}砝码 ${r.friction.toFixed(2)}N`, 25, yOff);
                yOff += 18;
            });
            
            const plotX = 200, plotY = 110, plotW = 200, plotH = 100;
            ctx.strokeStyle = "#aaa";
            ctx.strokeRect(plotX, plotY, plotW, plotH);
            ctx.font = "10px Arial";
            ctx.fillText("压力(N)", plotX + plotW/2 - 15, plotY + plotH + 20);
            ctx.fillText("摩擦力(N)", plotX - 25, plotY + plotH/2);
            records.forEach(r => {
                const px = plotX + (r.pressure * 2 + 2) / 15 * plotW;
                const py = plotY + plotH - r.friction / 8 * plotH;
                ctx.fillStyle = "#e74c3c";
                ctx.beginPath();
                ctx.arc(px, py, 4, 0, 2*Math.PI);
                ctx.fill();
            });
        }
        
        ctx.fillStyle = "#7f8c8d";
        ctx.font = "13px Arial";
        ctx.fillText("拖拽木块 改变参数 点击记录", 20, h - 20);
    }
    
    // 拖拽逻辑（鼠标 + 触摸）
    function handleDragStart(e) {
        const rect = canvas.getBoundingClientRect();
        const clientX = e.clientX ?? (e.touches ? e.touches[0].clientX : 0);
        const clientY = e.clientY ?? (e.touches ? e.touches[0].clientY : 0);
        const mx = (clientX - rect.left) * (canvas.width / rect.width);
        const my = (clientY - rect.top) * (canvas.height / rect.height);
        if (mx > blockX && mx < blockX + blockWidth && my > blockY - 40 && my < blockY) {
            isDragging = true;
            canvas.style.cursor = "grabbing";
        }
    }
    function handleDragMove(e) {
        if (isDragging) {
            const rect = canvas.getBoundingClientRect();
            const clientX = e.clientX ?? (e.touches ? e.touches[0].clientX : 0);
            const mx = (clientX - rect.left) * (canvas.width / rect.width);
            blockX = Math.min(canvas.width - 100, Math.max(50, mx - blockWidth/2));
            draw();
        }
    }
    function handleDragEnd() {
        isDragging = false;
        canvas.style.cursor = "default";
    }
    
    canvas.addEventListener("mousedown", handleDragStart);
    window.addEventListener("mousemove", handleDragMove);
    window.addEventListener("mouseup", handleDragEnd);
    canvas.addEventListener("touchstart", handleDragStart);
    canvas.addEventListener("touchmove", handleDragMove);
    canvas.addEventListener("touchend", handleDragEnd);
    
    // 按钮
    const surfaceSelect = document.getElementById("surfaceSelect");
    const addMassBtn = document.getElementById("addMass");
    const subMassBtn = document.getElementById("subMass");
    const recordBtn = document.getElementById("recordBtn");
    const clearBtn = document.getElementById("clearBtn");
    const massSpan = document.getElementById("massVal");
    
    if (surfaceSelect && !surfaceSelect.hasListener) {
        surfaceSelect.onchange = (e) => { surface = e.target.value; draw(); };
        addMassBtn.onclick = () => { pressure = Math.min(pressure + 1, 5); massSpan.innerText = pressure; draw(); };
        subMassBtn.onclick = () => { pressure = Math.max(pressure - 1, 1); massSpan.innerText = pressure; draw(); };
        recordBtn.onclick = () => {
            records.push({ surface, pressure, friction: getFriction(surface, pressure) });
            if (records.length > 10) records.shift();
            draw();
        };
        clearBtn.onclick = () => { records.length = 0; draw(); };
        surfaceSelect.hasListener = true;
    }
    
    window.addEventListener("resize", () => { draw(); });
    draw();
}

            <button class="btn stopwatch-reset" style="background:#aaa; color:white; padding:8px 20px;">复位</button>
        `;
        canvas.parentNode.appendChild(stopwatchContainer);
    }
    
    const startStopBtn = stopwatchContainer.querySelector(".stopwatch-startstop");
    const resetBtn = stopwatchContainer.querySelector(".stopwatch-reset");
    
    function drawRuler() {
        const w = canvas.clientWidth;
        const h = canvas.clientHeight;
        canvas.width = w;
        canvas.height = h;
        
        ctx.clearRect(0, 0, w, h);
        const bgColor = getComputedStyle(document.body).getPropertyValue('--bg-light').trim() || "#fef9f0";
        ctx.fillStyle = bgColor;
        ctx.fillRect(0, 0, w, h);
        
        // 判断是否为移动端（宽度 ≤ 768px）
        const isMobile = window.innerWidth <= 768;
        
        // 刻度尺左右边距（为秒表预留空间）
        const rulerStartX = 50;
        let rulerEndX = w - 50;
        if (isMobile) rulerEndX = w - 90;   // 移动端右侧留更多空间，避免与秒表重叠
        
        const rulerY = h * 0.6;
        const rulerLength = rulerEndX - rulerStartX;
        
        // 绘制刻度尺
        ctx.beginPath();
        ctx.moveTo(rulerStartX, rulerY);
        ctx.lineTo(rulerEndX, rulerY);
        ctx.lineWidth = 3;
        ctx.strokeStyle = "#333";
        ctx.stroke();
        
        for (let i = 0; i <= 20; i++) {
            const x = rulerStartX + (i / 20) * rulerLength;
            const isMajor = i % 5 === 0;
            ctx.beginPath();
            ctx.moveTo(x, rulerY);
            ctx.lineTo(x, rulerY - (isMajor ? 15 : 8));
            ctx.stroke();
            if (isMajor) {
                ctx.fillStyle = "#333";
                ctx.font = "12px Arial";
                ctx.fillText((i / 20 * 10).toFixed(1) + "cm", x - 10, rulerY - 18);
            }
        }
        
        // 滑块
        ctx.fillStyle = "#e6a157";
        ctx.fillRect(sliderX - 10, rulerY - 25, 20, 30);
        ctx.fillStyle = "#2c2418";
        ctx.font = "bold 14px Arial";
        let currentLen = ((sliderX - rulerStartX) / rulerLength * 10).toFixed(1);
        if (sliderX < rulerStartX) currentLen = "0.0";
        ctx.fillText(currentLen + " cm", sliderX - 15, rulerY - 30);
        
        // 秒表表盘（位置、大小根据屏幕宽度自适应）
        let stopwatchX, stopwatchY, stopwatchRadius;
        if (isMobile) {
            // 移动端：放在右上角，缩小尺寸，避免遮挡
            stopwatchX = w - 65;
            stopwatchY = 25;
            stopwatchRadius = 22;
        } else {
            stopwatchX = w - 120;
            stopwatchY = 30;
            stopwatchRadius = 30;
        }
        
        ctx.beginPath();
        ctx.arc(stopwatchX, stopwatchY, stopwatchRadius, 0, 2 * Math.PI);
        ctx.fillStyle = "#f0f0f0";
        ctx.fill();
        ctx.stroke();
        ctx.fillStyle = "#333";
        ctx.font = (isMobile ? "bold 12px monospace" : "bold 16px monospace");
        ctx.fillText((animationTime % 60).toFixed(1) + " s", stopwatchX - 18, stopwatchY + 6);
    }
    
    function updateSliderPosition(clientX) {
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        let mouseX = (clientX - rect.left) * scaleX;
        const w = canvas.clientWidth;
        const isMobile = window.innerWidth <= 768;
        const rulerStartX = 50;
        const rulerEndX = isMobile ? w - 90 : w - 50;
        sliderX = Math.min(Math.max(mouseX, rulerStartX), rulerEndX);
        drawRuler();
    }
    
    function timerCallback() {
        if (timerRunning) {
            animationTime += 0.1;
            drawRuler();
        }
    }
    
    function startTimer() {
        if (timerInterval) clearInterval(timerInterval);
        timerInterval = setInterval(timerCallback, 100);
    }
    
    function stopTimer() {
        if (timerInterval) clearInterval(timerInterval);
        timerInterval = null;
    }
    
    startStopBtn.onclick = () => {
        timerRunning = !timerRunning;
        if (timerRunning) {
            startTimer();
            startStopBtn.textContent = "停止";
            startStopBtn.style.background = "#e74c3c";
        } else {
            stopTimer();
            startStopBtn.textContent = "开始";
            startStopBtn.style.background = "var(--primary)";
        }
        drawRuler();
    };
    
    resetBtn.onclick = () => {
        timerRunning = false;
        stopTimer();
        animationTime = 0;
        startStopBtn.textContent = "开始";
        startStopBtn.style.background = "var(--primary)";
        drawRuler();
    };
    
    // 滑块拖拽事件（支持触摸）
    function handleDragStart(e) {
        e.preventDefault();
        let clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const mouseX = (clientX - rect.left) * scaleX;
        const rulerY = canvas.height * 0.6;
        if (Math.abs(mouseX - sliderX) < 20) {
            isDragging = true;
            canvas.style.cursor = "grabbing";
        }
    }
    
    function handleDragMove(e) {
        if (!isDragging) return;
        e.preventDefault();
        let clientX = e.touches ? e.touches[0].clientX : e.clientX;
        updateSliderPosition(clientX);
    }
    
    function handleDragEnd() {
        isDragging = false;
        canvas.style.cursor = "default";
    }
    
    canvas.addEventListener("mousedown", handleDragStart);
    window.addEventListener("mousemove", handleDragMove);
    window.addEventListener("mouseup", handleDragEnd);
    canvas.addEventListener("touchstart", handleDragStart);
    canvas.addEventListener("touchmove", handleDragMove);
    canvas.addEventListener("touchend", handleDragEnd);
    
    window.addEventListener("resize", () => drawRuler());
    drawRuler();
    startTimer();
}


    function renderProfile(container) {

                    <input type="file" id="avatarFile" accept="image/*" style="display:none;">
                    <div class="form-group"><label>用户名</label><input type="text" id="profileName" value="${escapeHtml(user.displayName || '')}"></div>
                    <div class="form-group"><label>邮箱</label><input type="email" id="profileEmail" value="${escapeHtml(user.email || '')}" readonly></div>

                    <div class="form-group"><label>专业/年级</label><input type="text" id="profileMajor" value="${escapeHtml(user.major || '')}"></div>
                    <button class="btn" id="saveProfileBtn">保存信息</button>
                </div>
                <div class="password-section"><h3><i class="fas fa-lock"></i> 修改密码</h3><div class="password-grid"><label>当前密码</label><input type="password" id="oldPwd" placeholder="请输入当前密码"><label>新密码</label><input type="password" id="newPwd" placeholder="至少6位"><label>确认新密码</label><input type="password" id="confirmPwd" placeholder="再次输入新密码"></div><div class="password-actions"><button class="btn" id="changePwdBtn">确认修改</button></div></div>
            </div>
        `;
        const avatarFile = document.getElementById("avatarFile");
        avatarFile.onchange = (e) => { const file = e.target.files[0]; if(file){ const reader = new FileReader(); reader.onload = (ev) => { const preview = document.getElementById("avatarPreview"); preview.innerHTML = `<img src="${ev.target.result}" style="width:100%;height:100%;object-fit:cover;">`; if(currentUser) currentUser.avatar = ev.target.result; saveCurrentUser(currentUser); updateUILoginState(); const users = getUsers(); const idx = users.findIndex(u=>u.email===currentUser.email); if(idx!==-1){ users[idx].avatar=ev.target.result; saveUsers(users); } }; reader.readAsDataURL(file); } };
        document.getElementById("saveProfileBtn").onclick = () => { if(!currentUser) return; currentUser.displayName = document.getElementById("profileName").value; currentUser.school = document.getElementById("profileSchool").value; currentUser.major = document.getElementById("profileMajor").value; saveCurrentUser(currentUser); const users = getUsers(); const idx = users.findIndex(u=>u.email===currentUser.email); if(idx!==-1){ users[idx]=currentUser; saveUsers(users); } updateUILoginState(); alert("信息已更新"); };
        document.getElementById("changePwdBtn").onclick = () => { const old = document.getElementById("oldPwd").value; const newp = document.getElementById("newPwd").value; const confirm = document.getElementById("confirmPwd").value; if(!old || !newp){ alert("请填写完整"); return; } if(newp !== confirm){ alert("新密码不一致"); return; } if(newp.length<6){ alert("密码至少6位"); return; } if(btoa(old) !== currentUser.password){ alert("当前密码错误"); return; } currentUser.password = btoa(newp); saveCurrentUser(currentUser); const users = getUsers(); const idx = users.findIndex(u=>u.email===currentUser.email); if(idx!==-1){ users[idx].password = btoa(newp); saveUsers(users); } alert("密码修改成功，请重新登录"); logout(); };
    }

function renderSettings(container) {
    const isDark = document.body.classList.contains("dark");
    container.innerHTML = `
        <div class="card">
            <h2 class="section-title"><i class="fas fa-cog"></i> 系统设置</h2>
            <p style="color:var(--text-light); margin-bottom:1.5rem;">控制界面主题、字体大小以及数据管理。</p>
            
            <!-- 外观设置 -->
            <div style="background:var(--bg-light); border-radius:20px; padding:1.2rem 1.5rem; margin-bottom:1.5rem;">
                <h3 style="font-size:1.2rem; margin-bottom:1rem; display:flex; align-items:center; gap:8px;">
                    <i class="fas fa-paint-brush"></i> 外观
                </h3>
                <div style="display:flex; justify-content:space-between; align-items:center; padding:0.8rem 0; border-bottom:1px solid var(--border);">
                    <div>
                        <strong>深色主题</strong>
                        <p style="font-size:0.85rem; color:var(--text-light); margin:0;">切换深色/浅色界面风格</p>
                    </div>
                    <label class="switch">
                        <input type="checkbox" id="themeToggle" ${isDark ? "checked" : ""}>
                        <span class="slider round"></span>
                    </label>
                </div>
                <div style="display:flex; justify-content:space-between; align-items:center; padding:0.8rem 0;">
                    <div>
                        <strong>字体大小</strong>
                        <p style="font-size:0.85rem; color:var(--text-light); margin:0;">调整全局文字大小</p>
                    </div>
                    <select id="fontSizeSelect" style="padding:6px 12px; border-radius:8px; border:1px solid var(--border); background:var(--card-bg); color:var(--text-dark);">
                        <option value="small" ${localStorage.getItem("fontSize") === "small" ? "selected" : ""}>小</option>
                        <option value="medium" ${localStorage.getItem("fontSize") !== "small" && localStorage.getItem("fontSize") !== "large" ? "selected" : ""}>中 (默认)</option>
                        <option value="large" ${localStorage.getItem("fontSize") === "large" ? "selected" : ""}>大</option>
                    </select>
                </div>
            </div>

            <!-- 数据管理 -->
            <div style="background:var(--bg-light); border-radius:20px; padding:1.2rem 1.5rem; margin-bottom:1.5rem;">
                <h3 style="font-size:1.2rem; margin-bottom:1rem; display:flex; align-items:center; gap:8px;">
                    <i class="fas fa-database"></i> 数据管理
                </h3>
                <div style="display:flex; gap:1rem; flex-wrap:wrap;">
                    <button class="btn" id="backupBtn" style="flex:1; min-width:120px; display:flex; align-items:center; justify-content:center; gap:8px;">
                        <i class="fas fa-download"></i> 备份数据
                    </button>
                    <button class="btn" id="restoreBtn" style="flex:1; min-width:120px; display:flex; align-items:center; justify-content:center; gap:8px;">
                        <i class="fas fa-upload"></i> 恢复数据
                    </button>
                </div>
                <p style="font-size:0.8rem; color:var(--text-light); margin-top:0.8rem;">备份数据将保存您的用户信息、设置和实验记录；恢复数据将覆盖当前所有数据。</p>
            </div>

            <!-- 关于 -->
            <div style="text-align:center; color:var(--text-light); font-size:0.85rem; margin-top:1rem;">
                <i class="fas fa-flask"></i> 中学物理实验系统 v1.0 · 格物致知
            </div>
        </div>
    `;

    // 深色主题开关事件
    document.getElementById("themeToggle").onchange = (e) => {
        document.body.classList.toggle("dark", e.target.checked);
        localStorage.setItem("theme", e.target.checked ? "dark" : "light");
    };

    // 字体大小选择
    const fontSizeSelect = document.getElementById("fontSizeSelect");
    fontSizeSelect.onchange = (e) => {
        const size = e.target.value;
        document.documentElement.style.fontSize =
            size === "small" ? "14px" : size === "large" ? "18px" : "16px";
        localStorage.setItem("fontSize", size);
        // 更新当前选中项（可选）
        fontSizeSelect.value = size;
    };

    // 备份数据
    document.getElementById("backupBtn").onclick = () => {
        const data = {
            users: getUsers(),
            currentUser,
            theme: localStorage.getItem("theme"),
            fontSize: localStorage.getItem("fontSize")
        };
        const blob = new Blob([JSON.stringify(data)], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = "physics_backup.json";
        a.click();
        URL.revokeObjectURL(url);
    };

    // 恢复数据
    document.getElementById("restoreBtn").onclick = () => {
        const input = document.createElement("input");
        input.type = "file";
        input.accept = "application/json";
        input.onchange = (e) => {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = (ev) => {
                try {
                    const data = JSON.parse(ev.target.result);
                    if (data.users) localStorage.setItem("physics_users", JSON.stringify(data.users));
                    if (data.currentUser) localStorage.setItem("physics_currentUser", JSON.stringify(data.currentUser));
                    if (data.theme) localStorage.setItem("theme", data.theme);
                    if (data.fontSize) localStorage.setItem("fontSize", data.fontSize);
                    alert("恢复成功，页面将刷新");
                    location.reload();
                } catch (ex) {
                    alert("恢复失败：文件格式错误");
                }
            };
            reader.readAsText(file);
        };
        input.click();
    };
}

    function escapeHtml(str) { return str.replace(/[&<>]/g, function(m){ if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }
    function login() { const email = document.getElementById("loginEmail").value.trim(); const pwd = document.getElementById("loginPassword").value; if (!isValidEmail(email)) { document.getElementById("authError").innerText = "请输入有效的邮箱地址"; document.getElementById("authError").style.display = "block"; return; } const users = getUsers(); const user = users.find(u => u.email === email && u.password === btoa(pwd)); if (user) { saveCurrentUser(user); closeAuthModal(); updateUILoginState(); renderPage(currentPage, currentExpId); } else { document.getElementById("authError").innerText = "邮箱或密码错误"; document.getElementById("authError").style.display = "block"; } }
    function register() { const name = document.getElementById("regName").value.trim(); const email = document.getElementById("regEmail").value.trim(); const pwd = document.getElementById("regPassword").value; if (!name || !email || pwd.length < 6) { document.getElementById("authError").innerText = "请完整填写，用户名、邮箱和密码（至少6位）"; document.getElementById("authError").style.display = "block"; return; } if (!isValidEmail(email)) { document.getElementById("authError").innerText = "请输入有效的邮箱地址"; document.getElementById("authError").style.display = "block"; return; } const users = getUsers(); if (users.find(u => u.email === email)) { document.getElementById("authError").innerText = "邮箱已存在"; document.getElementById("authError").style.display = "block"; return; } const newUser = { email, password: btoa(pwd), displayName: name, school: "", major: "", avatar: null }; users.push(newUser); saveUsers(users); saveCurrentUser(newUser); closeAuthModal(); updateUILoginState(); renderPage("home"); }
    function toggleAuthMode() { const loginDiv = document.getElementById("loginForm"); const regDiv = document.getElementById("registerForm"); loginDiv.style.display = loginDiv.style.display === "none" ? "block" : "none"; regDiv.style.display = regDiv.style.display === "none" ? "block" : "none"; document.getElementById("authError").style.display = "none"; const loginEmail = document.getElementById("loginEmail"); const regEmail = document.getElementById("regEmail"); if (loginEmail) loginEmail.value = ""; if (regEmail) regEmail.value = ""; if (document.getElementById("loginEmailIcon")) document.getElementById("loginEmailIcon").style.display = "none"; if (document.getElementById("regEmailIcon")) document.getElementById("regEmailIcon").style.display = "none"; if (document.getElementById("loginEmailMsg")) document.getElementById("loginEmailMsg").classList.remove("show"); if (document.getElementById("regEmailMsg")) document.getElementById("regEmailMsg").classList.remove("show"); }
    function logout(e) { if (e) e.stopPropagation(); localStorage.removeItem("physics_currentUser"); currentUser = null; updateUILoginState(); closeAuthModal(); renderPage("home"); }
    function bindEmailValidation() { const loginEmailInput = document.getElementById("loginEmail"); const regEmailInput = document.getElementById("regEmail"); if (loginEmailInput) { loginEmailInput.addEventListener("input", validateLoginEmail); loginEmailInput.addEventListener("blur", validateLoginEmail); } if (regEmailInput) { regEmailInput.addEventListener("input", validateRegEmail); regEmailInput.addEventListener("blur", validateRegEmail); } }
    document.getElementById("backToTopBtn").addEventListener("click", scrollToTop);

    function init() {
        const stored = loadCurrentUser();
        if (stored) { currentUser = stored; updateUILoginState(); } else { currentUser = null; updateUILoginState(); }
        const savedTheme = localStorage.getItem("theme"); if (savedTheme === "dark") document.body.classList.add("dark");
        const savedFont = localStorage.getItem("fontSize"); if (savedFont) document.documentElement.style.fontSize = savedFont === "small" ? "14px" : savedFont === "large" ? "18px" : "16px";
        document.querySelectorAll("[data-page]").forEach(link => { link.addEventListener("click", (e) => { e.preventDefault(); renderPage(link.dataset.page); }); });
        const logoutBtn = document.getElementById("logoutBtn"); if (logoutBtn) logoutBtn.onclick = logout;
        document.getElementById("hamburgerBtn").onclick = () => document.getElementById("mobileMenu").classList.toggle("open");
        document.addEventListener("click", (e) => { const menu = document.getElementById("mobileMenu"); const btn = document.getElementById("hamburgerBtn"); if (menu.classList.contains("open") && !menu.contains(e.target) && e.target !== btn && !btn.contains(e.target)) menu.classList.remove("open"); });
        const userArea = document.getElementById("userArea"); if (userArea) { userArea.addEventListener("click", (e) => { if (e.target.closest('.logout-btn')) return; if (currentUser) renderPage("profile"); else document.getElementById("authModal").style.display = "flex"; }); }
        bindEmailValidation(); renderPage("home");
    }
    init();
</script>
